<div class="add-provider-dialog">
  <h2 mat-dialog-title>Add Provider</h2>

  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Provider Name</mat-label>
      <input matInput [(ngModel)]="draft.name" placeholder="Enter provider name" />
    </mat-form-field>

    <div class="grid two-col">
      <mat-form-field appearance="outline">
        <mat-label>Status</mat-label>
        <mat-select [(ngModel)]="draft.status">
          <mat-option value="Accredited">Accredited</mat-option>
          <mat-option value="In Review">In Review</mat-option>
          <mat-option value="Pending">Pending</mat-option>
          <mat-option value="Rejected">Rejected</mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Capacity</mat-label>
        <input matInput type="number" min="1" [(ngModel)]="draft.capacity" />
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Registration ID</mat-label>
      <input matInput [(ngModel)]="draft.registrationId" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Address</mat-label>
      <input matInput [(ngModel)]="draft.address" />
    </mat-form-field>

    <div class="grid two-col">
      <mat-form-field appearance="outline">
        <mat-label>Rate Type</mat-label>
        <input matInput [(ngModel)]="draft.rateType" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Service Areas (comma separated)</mat-label>
        <input matInput [(ngModel)]="draft.serviceAreas" />
      </mat-form-field>
    </div>

    <div class="grid two-col">
      <mat-form-field appearance="outline">
        <mat-label>Contact Person</mat-label>
        <input matInput [(ngModel)]="draft.contactPerson" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Phone</mat-label>
        <input matInput [(ngModel)]="draft.phone" />
      </mat-form-field>
    </div>

    <div class="grid two-col">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput [(ngModel)]="draft.email" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>App Usage</mat-label>
        <input matInput [(ngModel)]="draft.appUsage" />
      </mat-form-field>
    </div>

    <div class="grid two-col">
      <mat-form-field appearance="outline">
        <mat-label>API URL</mat-label>
        <input matInput [(ngModel)]="draft.apiUrl" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>API Token (masked)</mat-label>
        <input matInput [(ngModel)]="draft.apiTokenMasked" />
      </mat-form-field>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="close()">Cancel</button>
    <button mat-flat-button color="primary" (click)="save()">Add Provider</button>
  </mat-dialog-actions>
</div>
